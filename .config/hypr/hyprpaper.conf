preload = ~/.local/share/bg
preload = ~/.config/hypr/arch-chan0.png
preload = ~/.config/hypr/0123.jpg
#if more than one preload is desired then continue to preload other backgrounds
# preload = /path/to/next_image.png
# .. more preloads

#set the default wallpaper(s) seen on initial workspace(s) --depending on the number of monitors used
wallpaper = DP-3,~/.config/hypr/arch-chan0.png
wallpaper = DP-2,~/.config/hypr/arch-chan0.png
#if more than one monitor in use, can load a 2nd image
wallpaper = HDMI-A-1,~/.config/hypr/arch-chan0.png
wallpaper = LVDS-1,~/.config/hypr/0123.jpg
# .. more monitors

#enable splash text rendering over the wallpaper
splash = true

#fully disable ipc
# ipc = off
